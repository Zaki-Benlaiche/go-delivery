<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff4757"/>
      <stop offset="100%" stop-color="#ffc048"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Subtle top shine overlay -->
  <rect width="512" height="256" rx="112" fill="url(#shine)"/>

  <!-- ===== FORK (left, centered at x=162) ===== -->

  <!-- 3 tines -->
  <rect x="121" y="106" width="15" height="92" rx="7.5" fill="white"/>
  <rect x="154" y="106" width="15" height="92" rx="7.5" fill="white"/>
  <rect x="187" y="106" width="15" height="92" rx="7.5" fill="white"/>

  <!-- Bridge below tines -->
  <rect x="121" y="182" width="81" height="15" rx="7.5" fill="white"/>

  <!-- Handle (centered: (121+7.5+187+7.5)/2 = 162, so x=154.5≈155) -->
  <rect x="154" y="191" width="15" height="218" rx="7.5" fill="white"/>

  <!-- ===== LIGHTNING BOLT (right, centered ~x=352) ===== -->
  <!--
    Polygon vertices (clockwise from top-right):
      395,106  — top right
      330,275  — waist left (upper bolt goes down-left)
      372,275  — waist right (horizontal step)
      298,409  — bottom tip
      407,248  — right side going up
      362,248  — inner right step
  -->
  <polygon
    points="395,106 330,275 372,275 298,409 407,248 362,248"
    fill="white"
  />

</svg>
